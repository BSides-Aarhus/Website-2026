<style>
:root{--color-bg:#0a0a0f;--color-bg-elevated:#12121a;--color-bg-card:#1a1a25;--color-text:#e8e8ed;--color-text-muted:#8888a0;--color-accent:#4AB8D2;--color-accent-light:#6DD0E7;--color-accent-glow:rgba(74,184,210,0.15);--color-border:#2a2a3a;--font-heading:'Inter',system-ui,-apple-system,sans-serif;--font-body:'Inter',system-ui,-apple-system,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,monospace;--space-xs:0.25rem;--space-sm:0.5rem;--space-md:1rem;--space-lg:2rem;--space-xl:4rem;--space-2xl:6rem;--max-width:1200px;--nav-height:64px;--radius:8px;--radius-lg:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);line-height:1.6;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse at 50% 0%,rgba(74,184,210,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(74,184,210,0.04) 0%,transparent 40%),radial-gradient(ellipse at 20% 80%,rgba(74,184,210,0.03) 0%,transparent 40%);background-attachment:fixed}
a{color:var(--color-accent-light);text-decoration:none;transition:color 0.2s}
a:hover{color:var(--color-accent)}
img{max-width:100%;height:auto;display:block}
ul{list-style:none}
h1,h2,h3,h4{font-family:var(--font-heading);font-weight:700;line-height:1.2}
h1{font-size:clamp(2rem,5vw,3.5rem)}
h2{font-size:clamp(1.5rem,3vw,2.25rem)}
h3{font-size:1.25rem}
.container{max-width:var(--max-width);margin:0 auto;padding:0 var(--space-lg)}
.section{padding:var(--space-2xl) 0;position:relative}
.section-header{text-align:center;margin-bottom:var(--space-xl)}
.section-header p{color:var(--color-text-muted);margin-top:var(--space-sm);font-size:1.1rem}
.btn{display:inline-flex;align-items:center;gap:var(--space-sm);padding:0.75rem 1.75rem;border-radius:var(--radius);font-weight:600;font-size:1rem;transition:all 0.2s;border:none;cursor:pointer;text-decoration:none}
.btn-primary{background:var(--color-accent);color:#fff}
.btn-primary:hover{background:var(--color-accent-light);color:#fff;box-shadow:0 0 20px var(--color-accent-glow)}
.btn-secondary{background:transparent;color:var(--color-accent-light);border:2px solid var(--color-accent)}
.btn-secondary:hover{background:var(--color-accent-glow);color:#fff}
.btn-lg{padding:1rem 2.5rem;font-size:1.125rem}
.site-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:rgba(10,10,15,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--color-border);z-index:100}
.nav-container{max-width:var(--max-width);margin:0 auto;padding:0 var(--space-lg);height:100%;display:flex;align-items:center;gap:var(--space-lg)}
.nav-logo{display:flex;align-items:center}
.nav-logo-img{height:72px;width:auto}
.nav-links{display:flex;align-items:center;gap:var(--space-md);margin-left:auto}
.nav-links a{color:var(--color-text-muted);font-size:0.9rem;font-weight:500;padding:var(--space-xs) var(--space-sm);transition:color 0.2s}
.nav-links a:hover,.nav-links a.active{color:var(--color-text)}
.nav-cta{margin-left:var(--space-sm)}
.nav-cta .btn{color:#fff}
.lang-switch{margin-left:var(--space-md)}
.lang-link{color:var(--color-text-muted);font-size:0.85rem;font-weight:500;padding:var(--space-xs) var(--space-sm);border:1px solid var(--color-border);border-radius:var(--radius);transition:all 0.2s}
.lang-link:hover{color:var(--color-text);border-color:var(--color-accent)}
.nav-toggle{display:none;background:none;border:none;cursor:pointer;padding:var(--space-sm)}
.hamburger,.hamburger::before,.hamburger::after{display:block;width:24px;height:2px;background:var(--color-text);transition:all 0.3s;position:relative}
.hamburger::before,.hamburger::after{content:'';position:absolute;left:0}
.hamburger::before{top:-7px}
.hamburger::after{top:7px}
.hero{padding-top:calc(var(--nav-height) + var(--space-2xl));padding-bottom:var(--space-2xl);text-align:center;background:radial-gradient(ellipse at 50% 0%,var(--color-accent-glow) 0%,transparent 60%)}
.hero-content{max-width:800px;margin:0 auto;padding:0 var(--space-lg)}
.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:var(--space-md)}
.hero h1 .accent{color:var(--color-accent-light)}
.hero-subtitle{font-size:clamp(1.1rem,2vw,1.35rem);color:var(--color-text-muted);margin-bottom:var(--space-sm);text-transform:uppercase;letter-spacing:0.15em;font-weight:500}
.hero-date{font-size:1.1rem;color:var(--color-text-muted);margin-bottom:var(--space-xl)}
.hero-cta{display:flex;gap:var(--space-md);justify-content:center;flex-wrap:wrap}
.countdown{display:flex;justify-content:center;gap:var(--space-lg);margin-top:var(--space-xl)}
.countdown-item{text-align:center}
.countdown-value{display:block;font-family:var(--font-mono);font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--color-accent-light);line-height:1}
.countdown-label{display:block;font-size:0.8rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:var(--space-xs)}
.hero-ticket-counter{margin-bottom:var(--space-lg);font-size:1rem;color:var(--color-text-muted)}
.hero-ticket-number{font-family:var(--font-mono);font-size:1.25rem;font-weight:700;color:var(--color-accent-light);transition:transform 0.3s;display:inline-block}
.page-header{padding-top:calc(var(--nav-height) + var(--space-xl));padding-bottom:var(--space-lg);text-align:center;background:radial-gradient(ellipse at 50% 0%,var(--color-accent-glow) 0%,transparent 60%)}
.page-header p{color:var(--color-text-muted);margin-top:var(--space-sm);font-size:1.1rem}
@media (max-width:768px){
.nav-toggle{display:block}
.nav-links{display:none;position:absolute;top:var(--nav-height);left:0;right:0;flex-direction:column;background:var(--color-bg-elevated);border-bottom:1px solid var(--color-border);padding:var(--space-md)}
.nav-links.open{display:flex}
.nav-cta{margin-left:0;margin-top:var(--space-sm)}
.lang-switch{margin-left:auto}
.hero h1{font-size:2.5rem}
.countdown{gap:var(--space-md)}
}
@media (max-width:480px){
.hero-cta{flex-direction:column;align-items:center}
}
</style>
