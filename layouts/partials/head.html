<!-- Cookie Consent CSS (load early to prevent FOUC) -->
<link rel="stylesheet" href="{{ "vendor/cookieconsent/cookieconsent.css" | relURL }}">

<!-- Google Consent Mode v2: Set defaults BEFORE any Google tag loads -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('consent', 'default', {
    'analytics_storage': 'denied',
    'ad_storage': 'denied',
    'ad_user_data': 'denied',
    'ad_personalization': 'denied'
  });
</script>

<!-- Google tag (gtag.js) — blocked until consent via data-category -->
<script type="text/plain" data-category="analytics" async src="https://www.googletagmanager.com/gtag/js?id=G-B901TPS7BK"></script>
<script type="text/plain" data-category="analytics">
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-B901TPS7BK');
</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Description | default site.Params.description }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title | default site.Title }}">
<meta property="og:description" content="{{ .Description | default site.Params.description }}">
<meta property="og:image" content="{{ site.Params.ogImage | absURL }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:site_name" content="{{ site.Title }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title | default site.Title }}">
<meta name="twitter:description" content="{{ .Description | default site.Params.description }}">
<meta name="twitter:image" content="{{ site.Params.ogImage | absURL }}">

<!-- Favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | relURL }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32x32.png" | relURL }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ "favicon-16x16.png" | relURL }}">
<link rel="icon" type="image/x-icon" href="{{ "favicon.ico" | relURL }}">
<link rel="manifest" href="{{ "site.webmanifest" | relURL }}">

{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Event",
  "name": "BSides Aarhus 2026",
  "description": "{{ .Description }}",
  "startDate": "2026-06-20T09:00:00+02:00",
  "endDate": "2026-06-20T18:00:00+02:00",
  "location": {
    "@type": "Place",
    "name": "INCUBA Next",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Åbogade 13",
      "addressLocality": "Aarhus N",
      "postalCode": "8200",
      "addressCountry": "DK"
    }
  },
  "organizer": {
    "@type": "Organization",
    "name": "BSides Aarhus",
    "url": "{{ site.BaseURL }}"
  },
  "offers": [
    {
      "@type": "Offer",
      "name": "Human Ticket",
      "price": "170",
      "priceCurrency": "DKK",
      "availability": "https://schema.org/InStock",
      "url": "{{ "/tickets/" | absURL }}"
    },
    {
      "@type": "Offer",
      "name": "Student Ticket",
      "price": "0",
      "priceCurrency": "DKK",
      "availability": "https://schema.org/InStock",
      "url": "{{ "/tickets/" | absURL }}"
    },
    {
      "@type": "Offer",
      "name": "Community Friend Ticket",
      "price": "1500",
      "priceCurrency": "DKK",
      "availability": "https://schema.org/InStock",
      "url": "{{ "/tickets/" | absURL }}"
    }
  ],
  "image": "{{ site.Params.ogImage | absURL }}",
  "url": "{{ .Permalink }}"
}
</script>
{{ end }}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
{{ with site.Params.ticketProxyURL }}<meta name="ticket-proxy-url" content="{{ . }}">{{ end }}
<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">

<!-- Cloudflare Web Analytics — cookieless, no consent needed, works in privacy browsers -->
{{ with site.Params.cfAnalyticsToken }}<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "{{ . }}"}'></script>{{ end }}
