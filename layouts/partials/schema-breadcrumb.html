{{- $sectionTitles := dict
  "sessions" (i18n "sessions" | default "Sessions")
  "speakers" (i18n "speakers" | default "Speakers")
-}}
{{- $sectionName := index $sectionTitles .Section | default (.Section | humanize) -}}
{{- $sectionURL := printf "/%s/" .Section | absLangURL -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": {{ site.Params.conferenceName | jsonify | safeJS }},
      "item": "{{ site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ $sectionName | jsonify | safeJS }},
      "item": "{{ $sectionURL }}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | jsonify | safeJS }},
      "item": {{ .Permalink | jsonify | safeJS }}
    }
  ]
}
</script>
